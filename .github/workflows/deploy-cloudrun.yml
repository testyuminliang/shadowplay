  # 想完全自己控制镜像构建时，用下面这套替代上面的 deploy job：
  # （需额外占位：AR_LOCATION / AR_REPOSITORY，且 Artifact Registry 里先建好 docker 仓库）
  #
  # deploy-explicit:
  #   runs-on: ubuntu-latest
  #   env:
  #     AR_LOCATION: asia-northeast1      # TODO【待定】镜像仓库地区（一般同 REGION）
  #     AR_REPOSITORY: nail-try-on        # TODO【待定】Artifact Registry 仓库名
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: google-github-actions/auth@v2
  #       with:
  #         workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
  #         service_account: ${{ secrets.GCP_DEPLOY_SA }}
  #     - uses: google-github-actions/setup-gcloud@v2
  #     - name: Configure Docker for Artifact Registry
  #       run: gcloud auth configure-docker ${{ env.AR_LOCATION }}-docker.pkg.dev --quiet
  #     - name: Build & push image
  #       run: |
  #         IMAGE="${{ env.AR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
  #         docker build -t "$IMAGE" .
  #         docker push "$IMAGE"
  #         echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
