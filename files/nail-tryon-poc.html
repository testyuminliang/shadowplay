<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nail.try</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf9f7;
    --card: #ffffff;
    --border: #f0eae4;
    --border-light: #f7f2ee;
    --text: #3d2f2f;
    --text-soft: #9a8e8e;
    --text-muted: #c4b8b2;
    --accent: #e8889e;
    --accent-hover: #dc7a90;
    --accent-bg: rgba(232,136,158,0.06);
    --accent-border: rgba(232,136,158,0.18);
    --green: #8ac4a0;
    --radius: 18px;
    --shadow-sm: 0 1px 3px rgba(60,30,30,0.04);
    --shadow-md: 0 4px 20px rgba(60,30,30,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 500; letter-spacing: -0.02em;
  }
  .logo em { font-style: normal; color: var(--accent); }
  .status-pill {
    font-size: 11px; color: var(--text-soft);
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); padding: 5px 12px; border-radius: 20px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted); transition: background 0.3s;
  }
  .status-pill.on .status-dot { background: var(--green); }
  .status-pill.loading .status-dot { background: #f0c87a; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* ── Layout ── */
  .layout { flex:1; display:flex; gap:12px; padding:12px; overflow:hidden; }

  /* ── Camera ── */
  .camera-panel {
    flex:1; position:relative;
    background: #eee8e2; border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow-md);
  }
  .camera-panel video {
    display:block; width:100%; height:100%; object-fit:cover;
    transform: scaleX(-1);
  }
  .camera-panel canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; transform: scaleX(-1);
    /* MUST match the video's object-fit, or the overlay drifts off the nails:
       video crops with cover while a default canvas stretches (fill), so any
       non-16:9 panel misaligns more toward the edges. Canvas intrinsic size is
       set to the video's native resolution, so cover crops identically here. */
    object-fit: cover;
  }
  .camera-start {
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    background: rgba(253,249,247,0.88);
    backdrop-filter: blur(8px);
  }
  .camera-start p { font-size:14px; color:var(--text-soft); }
  .btn-start {
    padding: 12px 36px; border-radius: 28px; border: none;
    background: var(--accent); color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.01em;
    box-shadow: 0 4px 16px rgba(232,136,158,0.3);
    transition: background 0.2s, transform 0.1s;
  }
  .btn-start:hover { background: var(--accent-hover); transform: translateY(-1px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 210px; display: flex; flex-direction: column; gap: 10px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }
  .card-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* ── Nail grid ── */
  .nail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .nail-swatch {
    aspect-ratio: 1; border-radius: 10px; border: 2.5px solid transparent;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .nail-swatch:hover { transform: scale(1.12); }
  .nail-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .nail-swatch.active::after {
    content: '✓'; position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* ── Upload ── */
  .upload-drop {
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 20px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .upload-drop:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .upload-drop .icon { font-size: 26px; filter: grayscale(0.3); }
  .upload-drop .desc { font-size: 11px; line-height: 1.5; color: var(--text-soft); }
  .upload-drop .desc b { color: var(--accent); font-weight: 500; }
  .tag-ai {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 500;
    color: #a080d0; background: rgba(160,128,208,0.08);
    padding: 3px 8px; border-radius: 8px;
  }

  /* ── Controls (bottom) ── */
  .controls-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 20px 12px;
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .ctrl {
    display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;
  }
  .ctrl-label {
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    white-space: nowrap; min-width: 34px;
  }
  .ctrl input[type=range] {
    flex: 1; min-width: 0;
    -webkit-appearance: none; appearance: none;
    height: 3px; border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  .ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--accent);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
  }
  .ctrl-val {
    font-size: 10px; color: var(--text-soft);
    min-width: 26px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .btn-debug {
    font-size: 10px; color: var(--text-muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 10px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-debug.active { color: var(--green); border-color: var(--green); background: rgba(138,196,160,0.06); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">nail<em>.</em>try</div>
  <div class="status-pill" id="status">
    <span class="status-dot"></span>
    <span class="status-text">Initializing…</span>
  </div>
</div>

<div class="layout">
  <div class="camera-panel">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="camera-start" id="startOverlay">
      <p id="startMsg">Show your hands to try on virtual nails</p>
      <button class="btn-start" id="startBtn">Open Camera</button>
      <p id="startHint" style="display:none; font-size:11px; color:#c06a7a; max-width:340px; text-align:center; line-height:1.6; margin-top:4px;"></p>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <div class="card-label">Choose a style</div>
      <div class="nail-grid" id="nailGrid">
        <div class="nail-swatch active" data-type="solid" data-color="#e8889e" style="background:#e8889e"></div>
        <div class="nail-swatch" data-type="solid" data-color="#c9a0e4" style="background:#c9a0e4"></div>
        <div class="nail-swatch" data-type="solid" data-color="#e47070" style="background:#e47070"></div>
        <div class="nail-swatch" data-type="solid" data-color="#f4e0d0" style="background:#f4e0d0;border:1px solid #e8dcd0"></div>
        <div class="nail-swatch" data-type="gradient" data-colors='["#f0a0b8","#a8b8f0"]' style="background:linear-gradient(135deg,#f0a0b8,#a8b8f0)"></div>
        <div class="nail-swatch" data-type="gradient" data-colors='["#e8c0a0","#f0dca0"]' style="background:linear-gradient(135deg,#e8c0a0,#f0dca0)"></div>
        <div class="nail-swatch" data-type="solid" data-color="#f0c8d0" style="background:#f0c8d0"></div>
        <div class="nail-swatch" data-type="solid" data-color="#2d2226" style="background:#2d2226"></div>
      </div>
    </div>
    <div class="card" style="flex:1;">
      <div class="card-label">AI Generate</div>
      <div class="upload-drop">
        <span class="icon">💅</span>
        <div class="desc"><b>Upload a nail photo</b><br>AI reads the design and creates a wearable overlay</div>
        <span class="tag-ai">✦ Gemini + Imagen</span>
      </div>
    </div>
  </div>
</div>

<div class="controls-bar">
  <div class="ctrl">
    <span class="ctrl-label">Size</span>
    <input type="range" min="20" max="100" value="46" id="sizeSlider">
    <span class="ctrl-val" id="sizeVal">46</span>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Width</span>
    <input type="range" min="30" max="120" value="60" id="widthSlider">
    <span class="ctrl-val" id="widthVal">60</span>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Pos</span>
    <input type="range" min="55" max="90" value="72" id="offsetSlider">
    <span class="ctrl-val" id="offsetVal">72</span>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Smooth</span>
    <input type="range" min="0" max="100" value="60" id="smoothSlider">
    <span class="ctrl-val" id="smoothVal">60</span>
  </div>
  <button class="btn-debug active" id="palmBtn" title="掌心朝镜头时隐藏甲片">Palm</button>
  <button class="btn-debug" id="debugBtn">Debug</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

<script>
// ─── State ──────────────────────────────────────────────────
let showDebug = false;
let sizeScale  = 0.46;
let widthScale = 0.60;
let nailOffset = 0.72;
let smoothAmt  = 0.60;   // One Euro smoothing strength: 0 = off (raw), 1 = max
let palmHide   = true;   // hide nails when the palm (not the back) faces the camera
let currentNail = { type: 'solid', color: '#e8889e' };

const video  = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

// Reliable v2 finger config (DIP→TIP based sizing)
const FINGERS = [
  { name:'thumb',  pip:2,  dip:3,  tip:4,  w:0.60, l:0.64 },
  { name:'index',  pip:6,  dip:7,  tip:8,  w:0.55, l:0.60 },
  { name:'middle', pip:10, dip:11, tip:12, w:0.55, l:0.62 },
  { name:'ring',   pip:14, dip:15, tip:16, w:0.52, l:0.60 },
  { name:'pinky',  pip:18, dip:19, tip:20, w:0.48, l:0.55 },
];

// ─── Temporal smoothing (One Euro filter) ──────────────────
// MediaPipe re-estimates landmarks every frame, so they jitter a few px even on
// a perfectly still hand — and we were drawing the raw values. The One Euro
// filter low-passes each value we draw from: heavy smoothing when the hand is
// slow (kills the jitter), light when it moves fast (stays responsive). Strength
// is live-tunable via the Smooth slider. Ref: Casiez et al., "1€ Filter".
function euroMinCutoff() {
  // map smoothAmt 0..1 → cutoff Hz (low cutoff = more smoothing)
  return Math.exp((1 - smoothAmt) * Math.log(8) + smoothAmt * Math.log(0.4));
}
const EURO_BETA = 0.6, EURO_DCUTOFF = 1.0;
class OneEuro {
  constructor() { this.xPrev = null; this.dxPrev = 0; this.tPrev = null; }
  _alpha(cutoff, dt) { const tau = 1 / (2 * Math.PI * cutoff); return 1 / (1 + tau / dt); }
  filter(x, t) {
    if (this.tPrev == null) { this.tPrev = t; this.xPrev = x; return x; }
    let dt = (t - this.tPrev) / 1000; if (!(dt > 0)) dt = 1 / 60;
    this.tPrev = t;
    const dx = (x - this.xPrev) / dt;
    const aD = this._alpha(EURO_DCUTOFF, dt);
    this.dxPrev = aD * dx + (1 - aD) * this.dxPrev;
    const cutoff = euroMinCutoff() + EURO_BETA * Math.abs(this.dxPrev);
    const a = this._alpha(cutoff, dt);
    this.xPrev = a * x + (1 - a) * this.xPrev;
    return this.xPrev;
  }
}
const _filters = new Map();           // key "hand:finger:param" → OneEuro
function smooth(key, value, t) {
  if (smoothAmt <= 0.001) return value;   // slider at 0 → passthrough (raw landmarks)
  let f = _filters.get(key);
  if (!f) { f = new OneEuro(); _filters.set(key, f); }
  return f.filter(value, t);
}

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = 'status-pill' + (cls ? ' ' + cls : '');
  el.querySelector('.status-text').textContent = text;
}
function resizeCanvas() {
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
}

// ─── MediaPipe ──────────────────────────────────────────────
let handsReady = false, mpHands;

function initHands() {
  setStatus('loading', 'Loading model…');
  try {
    mpHands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`
    });
    mpHands.setOptions({
      maxNumHands: 2, modelComplexity: 1,
      minDetectionConfidence: 0.6, minTrackingConfidence: 0.5,
    });
    mpHands.onResults(onResults);
    handsReady = true;
    setStatus('', 'Ready');
  } catch (err) {
    console.error(err);
    setStatus('', 'Model failed');
  }
}

async function startCamera() {
  const hintEl = document.getElementById('startHint');
  const msgEl = document.getElementById('startMsg');
  const btnEl = document.getElementById('startBtn');
  hintEl.style.display = 'none';

  // Camera needs HTTPS or localhost. NOTE: Chrome reports file:// as a secure
  // context (isSecureContext === true), so we must check the protocol too —
  // otherwise double-clicking the file skips this hint and fails on getUserMedia.
  if (location.protocol === 'file:' || !window.isSecureContext) {
    hintEl.textContent = '⚠️ Camera requires HTTPS or localhost. You\'re opening this as a local file. Run the start-server script and open http://localhost:8080/nail-tryon-poc.html instead.';
    hintEl.style.display = 'block';
    msgEl.textContent = 'Secure context required';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' }
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('startOverlay').style.display = 'none';
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    new Camera(video, {
      onFrame: async () => { if(handsReady) try { await mpHands.send({image:video}); } catch(e){} },
      width: 1280, height: 720,
    }).start();
  } catch(e) {
    console.error(e);
    btnEl.textContent = 'Retry';
    if (e.name === 'NotAllowedError') {
      hintEl.innerHTML = '⚠️ Camera permission was denied or dismissed.<br><br><b>Fix:</b> Click the 🔒 icon in your address bar → Site settings → Camera → Allow, then click Retry.';
    } else if (e.name === 'NotFoundError') {
      hintEl.textContent = '⚠️ No camera found. Please connect a camera and retry.';
    } else {
      hintEl.textContent = '⚠️ ' + e.name + ': ' + e.message;
    }
    hintEl.style.display = 'block';
    msgEl.textContent = 'Camera access failed';
  }
}

// ─── Results ────────────────────────────────────────────────
function onResults(results) {
  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const hands = results.multiHandLandmarks;
  const handed = results.multiHandedness || [];
  if (hands && hands.length > 0) {
    setStatus('on', `${hands.length} hand${hands.length>1?'s':''}`);
    const now = (typeof performance !== 'undefined') ? performance.now() : Date.now();
    for (let i = 0; i < hands.length; i++) {
      // key smoothing state by hand chirality so each hand keeps its own filters
      const label = (handed[i] && handed[i].label) ? handed[i].label : null;
      const key = label || ('hand' + i);
      if (showDebug) drawDebug(hands[i]);
      drawNails(hands[i], key, now, label);
    }
  } else {
    setStatus('', 'Show your hands');
  }
}

// ─── Nail Drawing (v2-based, reliable) ─────────────────────
function drawNails(lm, handKey, now, label) {
  const w = canvas.width, h = canvas.height;

  // ── Palm vs back of hand ───────────────────────────────────
  // Nails live on the BACK of the hand, so when the palm faces the camera there
  // are no nails to show. We read the z-component of the palm normal — which is
  // just the 2D winding of the (wrist, indexMCP, pinkyMCP) triangle: ax*by-ay*bx.
  // It needs NO depth (robust, unlike the per-finger normals that failed in v4)
  // and the triangle is large (stable). Its sign means palm-vs-back per hand
  // chirality; the (label, sign) combo is invariant to image mirroring, so this
  // rule holds whether or not the camera feed is mirrored.
  const ax = lm[5].x - lm[0].x, ay = lm[5].y - lm[0].y;
  const bx = lm[17].x - lm[0].x, by = lm[17].y - lm[0].y;
  const nz = smooth(handKey + ':palmnz', ax * by - ay * bx, now);  // smoothed to avoid boundary flicker
  // |nz| small ⇒ hand edge-on / ambiguous ⇒ don't gate (per-finger fade handles it)
  const palmFacing = palmHide && !!label && Math.abs(nz) > 0.008 &&
                     ((label === 'Right') ? nz > 0 : nz < 0);

  if (showDebug) {
    ctx.save();
    ctx.font = '13px monospace'; ctx.globalAlpha = 0.85;
    ctx.fillStyle = palmFacing ? '#c06a7a' : '#4a9a6a';
    ctx.fillText(`${label || '?'} ${palmFacing ? 'PALM → hide' : 'BACK → show'}  nz=${nz.toFixed(3)}`,
                 lm[0].x * w + 8, lm[0].y * h);
    ctx.restore();
  }

  if (palmFacing) return;   // palm side toward camera → no nails visible

  for (const f of FINGERS) {
    const dip = lm[f.dip], tip = lm[f.tip];
    const k = handKey + ':' + f.name;

    // Smooth the values we draw from, in normalized space (resolution-independent),
    // then convert to pixels. zDelta drives visibility, so smoothing it too stops
    // the nail from flickering on/off at angled views.
    const dipX = smooth(k+':dx', dip.x, now) * w, dipY = smooth(k+':dy', dip.y, now) * h;
    const tipX = smooth(k+':tx', tip.x, now) * w, tipY = smooth(k+':ty', tip.y, now) * h;
    const zDelta = smooth(k+':z', tip.z - dip.z, now);

    // ── Simple, reliable visibility checks ──

    // 1. Segment length too short → skip
    const seg = Math.hypot(tipX-dipX, tipY-dipY);
    if (seg < 12) continue;

    // 2. z-check: tip far behind dip → finger curled away from camera
    if (zDelta > 0.04) continue;

    // 3. Finger completely folded into palm: tip close to MCP
    const mcp = lm[f.pip - 1] || lm[f.pip]; // MCP is one before PIP in chain
    const tipMcpDist = Math.hypot(tip.x - mcp.x, tip.y - mcp.y);
    if (tipMcpDist < 0.04 && f.name !== 'thumb') continue;

    // ── Geometry ──
    const cx = dipX + (tipX - dipX) * nailOffset;
    const cy = dipY + (tipY - dipY) * nailOffset;
    const angle = Math.atan2(tipY - dipY, tipX - dipX);

    const nailLen = seg * f.l * sizeScale;
    const nailWid = seg * f.w * sizeScale * widthScale;

    // ── Opacity: fade as the nail tilts toward edge-on; hide once too grazing.
    //    This is what tames the thumb when the hand turns sideways — its distal
    //    segment then points toward/away from the camera (large |Δz|), so the
    //    nail is seen edge-on and should disappear, not linger as a flat blob. ──
    const zAbs = Math.abs(zDelta);
    const fadeAlpha = zAbs > 0.02 ? 1 - (zAbs - 0.02) * 13 : 1;
    if (fadeAlpha < 0.3) continue;          // too edge-on → nail not facing camera, hide it

    drawSingleNail(cx, cy, angle, nailLen, nailWid, fadeAlpha * 0.85);
  }
}

function drawSingleNail(cx, cy, angle, len, wid, alpha) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle - Math.PI/2);

  const rx = wid/2, ry = len/2;

  // ── Nail path ──
  ctx.beginPath();
  ctx.moveTo(0, ry * 0.82);                                    // cuticle center
  ctx.bezierCurveTo(rx*0.5, ry*0.82, rx*0.85, ry*0.6, rx*0.92, ry*0.1);  // right cuticle→side
  ctx.bezierCurveTo(rx*0.96, -ry*0.3, rx*0.8, -ry*0.8, rx*0.35, -ry);    // right side→tip
  ctx.quadraticCurveTo(0, -ry*1.08, -rx*0.35, -ry);                        // tip arc
  ctx.bezierCurveTo(-rx*0.8, -ry*0.8, -rx*0.96, -ry*0.3, -rx*0.92, ry*0.1); // left tip→side
  ctx.bezierCurveTo(-rx*0.85, ry*0.6, -rx*0.5, ry*0.82, 0, ry*0.82);      // left side→cuticle
  ctx.closePath();

  // Fill
  if (currentNail.type === 'solid') {
    ctx.fillStyle = currentNail.color;
  } else {
    const g = ctx.createLinearGradient(0, -ry, 0, ry);
    g.addColorStop(0, currentNail.colors[0]);
    g.addColorStop(1, currentNail.colors[1]);
    ctx.fillStyle = g;
  }
  ctx.globalAlpha = alpha;
  ctx.fill();

  // ── Gloss layers ──
  // Narrow vertical highlight
  ctx.globalAlpha = alpha * 0.20;
  ctx.beginPath();
  ctx.ellipse(-rx*0.28, -ry*0.05, rx*0.05, ry*0.55, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Wider soft glow
  ctx.globalAlpha = alpha * 0.08;
  ctx.beginPath();
  ctx.ellipse(-rx*0.12, 0, rx*0.18, ry*0.5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Cuticle shadow
  ctx.globalAlpha = alpha * 0.10;
  ctx.beginPath();
  ctx.ellipse(0, ry*0.65, rx*0.6, ry*0.12, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(60,30,30,1)';
  ctx.fill();

  // Edge
  ctx.globalAlpha = alpha * 0.15;
  ctx.strokeStyle = 'rgba(40,20,25,0.35)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  ctx.restore();
}

// ─── Debug ──────────────────────────────────────────────────
function drawDebug(lm) {
  const w = canvas.width, h = canvas.height;
  ctx.save();
  const conns = [
    [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
  ];
  ctx.strokeStyle = 'rgba(138,196,160,0.18)'; ctx.lineWidth = 1;
  for (const [a,b] of conns) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x*w, lm[a].y*h);
    ctx.lineTo(lm[b].x*w, lm[b].y*h);
    ctx.stroke();
  }
  for (let i=0; i<lm.length; i++) {
    const x=lm[i].x*w, y=lm[i].y*h;
    const isDip=[3,7,11,15,19].includes(i), isTip=[4,8,12,16,20].includes(i);
    ctx.globalAlpha=0.7; ctx.beginPath();
    ctx.arc(x, y, isDip||isTip?3.5:1.8, 0, Math.PI*2);
    ctx.fillStyle = isTip?'#e8889e' : isDip?'#f0c87a' : 'rgba(138,196,160,0.4)';
    ctx.fill();
    if (isDip||isTip) {
      ctx.fillStyle='#5a504a'; ctx.font='9px monospace'; ctx.fillText(i, x+5, y-3);
    }
  }
  // z-values for tips
  ctx.font = '9px monospace'; ctx.globalAlpha = 0.5;
  for (const f of FINGERS) {
    const tip = lm[f.tip], dip = lm[f.dip];
    const x = tip.x*w, y = tip.y*h;
    const zd = (tip.z - dip.z).toFixed(3);
    ctx.fillStyle = parseFloat(zd) > 0.04 ? '#c06a7a' : '#4a9a6a';
    ctx.fillText(`z:${zd}`, x+8, y+12);
  }
  ctx.restore();
}

// ─── UI ─────────────────────────────────────────────────────
document.getElementById('nailGrid').addEventListener('click', e => {
  const sw = e.target.closest('.nail-swatch');
  if (!sw) return;
  document.querySelectorAll('.nail-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  if (sw.dataset.type === 'solid') currentNail = { type:'solid', color:sw.dataset.color };
  else currentNail = { type:'gradient', colors:JSON.parse(sw.dataset.colors) };
});

// NOTE: assign to the lexical `let` bindings directly via setters.
// A top-level `let` is NOT a property of `window`, so `window.sizeScale = …`
// would create a separate global that the renderer never reads.
const sliders = {
  sizeSlider:   { set: v => { sizeScale  = v / 100; }, valId:'sizeVal' },
  widthSlider:  { set: v => { widthScale = v / 100; }, valId:'widthVal' },
  offsetSlider: { set: v => { nailOffset = v / 100; }, valId:'offsetVal' },
  smoothSlider: { set: v => { smoothAmt  = v / 100; }, valId:'smoothVal' },
};
for (const [id, cfg] of Object.entries(sliders)) {
  document.getElementById(id).addEventListener('input', e => {
    const v = parseInt(e.target.value);
    cfg.set(v);
    document.getElementById(cfg.valId).textContent = v;
  });
}

document.getElementById('debugBtn').addEventListener('click', e => {
  showDebug = !showDebug;
  e.target.classList.toggle('active', showDebug);
});
document.getElementById('palmBtn').addEventListener('click', e => {
  palmHide = !palmHide;
  e.target.classList.toggle('active', palmHide);
});
document.getElementById('startBtn').addEventListener('click', () => startCamera());

initHands();
</script>
